<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Page Coming Soon | Yankai Zhao</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      color-scheme: light;
      --ink: #151b1a;
      --muted: #4f5d72;
      --line: #d7def0;
      --paper: #f3f6ff;
      --panel: #ffffff;
      --accent: #2158ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(33, 88, 255, 0.12), rgba(139, 92, 246, 0.1)),
        var(--paper);
    }

    main {
      width: min(680px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px;
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(20, 42, 103, 0.12);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .eyebrow {
      width: fit-content;
      margin-bottom: 14px;
      border: 1px solid #ccd6f5;
      border-radius: 999px;
      background: #fff;
      color: #2b3f86;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 750;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1;
      letter-spacing: 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border: 1px solid #c7d2f2;
      border-radius: 10px;
      padding: 0 14px;
      color: var(--ink);
      background: #fff;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }

    a.primary {
      border-color: var(--accent);
      color: #fff;
      background: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Project page coming soon</p>
    <h1 id="projectTitle">Coming Soon</h1>
    <p>
      This public project page is still being prepared. The source code is available on GitHub,
      and the live page will be added here when it is ready.
    </p>
    <div class="actions">
      <a class="primary" href="./#projects">Back to projects</a>
      <a href="https://github.com/yankaizhao322">GitHub profile</a>
    </div>
  </main>
  <script>
    const titles = {
      "credit-default-prediction": "Credit Default Prediction using XGBoost",
      "stock-price-prediction": "Stock Price Prediction using LLM and GAN Models",
      "parkinsons-severity-classification": "Parkinson's Disease Severity Classification",
      "minichess-agent": "Deep Reinforcement Learning Agent for MiniChess",
    };
    const project = new URLSearchParams(window.location.search).get("project");
    document.querySelector("#projectTitle").textContent = titles[project] || "Coming Soon";
  </script>
</body>
</html>
